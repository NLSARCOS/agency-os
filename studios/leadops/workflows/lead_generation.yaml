# LeadOps — Lead Generation Workflow
id: leadops_generate
name: "Lead Generation Pipeline"
description: "Full lead generation: research, scrape, enrich, score, export"
version: "1.0"

nodes:
  - id: research
    name: "Market Research"
    type: agent
    agent: backend-specialist
    task: |
      Research the target market and identify potential lead sources.
      Find relevant websites, directories, and databases for lead extraction.
      Output a list of URLs and strategies for data collection.

  - id: scrape
    name: "Lead Scraping"
    type: tool
    tool: search_web
    agent: backend-specialist
    params:
      query: "$research.content"
    depends_on: [research]

  - id: enrich
    name: "Data Enrichment"
    type: agent
    agent: backend-specialist
    task: |
      Take the scraped leads and enrich them with additional data:
      - Verify contact information
      - Add company details
      - Classify by industry and size
    depends_on: [scrape]

  - id: quality_check
    name: "Quality Gate"
    type: condition
    condition: "len(enrich.get('content', '')) > 50"
    on_success: score
    on_failure: review_manual
    depends_on: [enrich]

  - id: score
    name: "Lead Scoring"
    type: agent
    agent: backend-specialist
    task: |
      Score each lead based on:
      - Fit with ideal customer profile (ICP)
      - Company size and revenue potential
      - Engagement signals
      Assign scores from 1-100.
    depends_on: [quality_check]

  - id: review_manual
    name: "Manual Review Required"
    type: human
    task: "Enrichment quality is low. Please review the leads and provide corrections or approve to continue."
    depends_on: [quality_check]

  - id: export
    name: "Export Results"
    type: agent
    agent: backend-specialist
    task: "Format the scored leads into a clean CSV/JSON report with columns: name, company, email, phone, score, notes."
    depends_on: [score, review_manual]
