<!-- Template syntax (Handlebars/Mustache) -->
<div class="client-block">
  <h1>{{client.company}}</h1>
  <p>{{client.contact}}</p>
</div>

{{#each scope.items}}
  <div class="scope-item" style="break-inside: avoid;">
    <h3>{{title}}</h3>
    <p>{{description}}</p>
    <span class="price">{{currency total}}</span>
  </div>
{{/each}}
